<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Data Validator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 2rem; }
        .card { max-width: 1100px; margin: 0 auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
        .file-input { border: 2px dashed #cbd5e1; padding: 1.5rem; border-radius: 8px; text-align: center; cursor: pointer; }
        .file-input:hover { border-color: var(--primary); background: #eff6ff; }
        button { width: 100%; padding: 0.75rem; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
        .btn-run { background: var(--primary); color: white; }
        .btn-run:hover { background: #1d4ed8; }
        .btn-download { background: #10b981; color: white; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; font-size: 0.9rem; }
        th { background: #f1f5f9; padding: 12px; text-align: left; border: 1px solid #e2e8f0; }
        td { padding: 10px; border: 1px solid #e2e8f0; }
        .mismatch { color: #dc2626; font-weight: bold; background: #fee2e2; }
        .empty { color: #94a3b8; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <h2>Excel Data Validator</h2>
    <p>Upload both files to compare matching columns using <strong>PERSON_NUMBER</strong>.</p>
    
    <div class="grid">
        <div class="file-input">
            <strong>Active Employee List</strong><br>
            <input type="file" id="activeFile" accept=".xlsx, .xls">
        </div>
        <div class="file-input">
            <strong>Contract Management File</strong><br>
            <input type="file" id="contractFile" accept=".xlsx, .xls">
        </div>
    </div>

    <button class="btn-run" onclick="processValidation()">Run Validation Scan</button>
    <button id="downloadBtn" class="btn-download" onclick="downloadErrorReport()">Download Error Report (.xlsx)</button>

    <div id="summary"></div>
    <div id="resultsTable"></div>
</div>

<script>
let lastErrors = []; // Global store for downloading

async function processValidation() {
    const fileA = document.getElementById('activeFile').files[0];
    const fileC = document.getElementById('contractFile').files[0];

    if (!fileA || !fileC) {
        alert("Please select both Excel files.");
        return;
    }

    const dataA = await readExcel(fileA);
    const dataC = await readExcel(fileC);

    // Columns to validate (matching exactly on both files)
    const columns = [
        'NATIONALITY', 'WORKER_CATEGORY', 'Age_H', 'JOB_NAME', 
        'CONTRACT_END_DATE', 'PERFORMANCE_EVALUATION_TYPE', 
        '2024_Evaluation', '2025_Evaluation'
    ];

    // Create Map for Active List (Source of Truth)
    const activeMap = new Map();
    dataA.forEach(row => {
        if (row.PERSON_NUMBER) activeMap.set(String(row.PERSON_NUMBER), row);
    });

    const errors = [];

    // Compare Contract File against Active Map
    dataC.forEach(cRow => {
        const pId = String(cRow.PERSON_NUMBER || '');
        const aRow = activeMap.get(pId);

        if (aRow) {
            columns.forEach(col => {
                const valA = String(aRow[col] || '').trim();
                const valC = String(cRow[col] || '').trim();

                if (valA !== valC) {
                    errors.push({
                        "Person Number": pId,
                        "Full Name": aRow.FULL_NAME_G || 'Unknown',
                        "Field": col,
                        "Active List Value": valA || '(Empty)',
                        "Contract File Value": valC || '(Empty)'
                    });
                }
            });
        }
    });

    lastErrors = errors;
    displayResults(errors);
}

function readExcel(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, { type: 'array' });
            resolve(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]));
        };
        reader.readAsArrayBuffer(file);
    });
}

function displayResults(errors) {
    const container = document.getElementById('resultsTable');
    const summary = document.getElementById('summary');
    const dlBtn = document.getElementById('downloadBtn');

    if (errors.length === 0) {
        summary.innerHTML = "<h3 style='color:green'>✅ All records match perfectly!</h3>";
        container.innerHTML = "";
        dlBtn.style.display = "none";
        return;
    }

    summary.innerHTML = `<h3>⚠️ Found ${errors.length} discrepancies</h3>`;
    dlBtn.style.display = "block";

    let html = `<table><tr>
        <th>ID</th><th>Name</th><th>Column Name</th><th>Active List</th><th>Contract File</th>
    </tr>`;

    errors.forEach(err => {
        html += `<tr>
            <td>${err["Person Number"]}</td>
            <td>${err["Full Name"]}</td>
            <td>${err["Field"]}</td>
            <td>${err["Active List Value"]}</td>
            <td class="mismatch">${err["Contract File Value"]}</td>
        </tr>`;
    });

    html += `</table>`;
    container.innerHTML = html;
}

function downloadErrorReport() {
    if (lastErrors.length === 0) return;
    const worksheet = XLSX.utils.json_to_sheet(lastErrors);
    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, "Discrepancies");
    XLSX.writeFile(workbook, "Validation_Error_Report.xlsx");
}
</script>

</body>
</html>
