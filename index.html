<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Data Integrity Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --error-bg: #fef2f2;
            --error-text: #991b1b;
            --success-bg: #f0fdf4;
            --success-text: #166534;
            --border: #e5e7eb;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            margin: 0;
            font-size: 2rem;
            color: var(--text-main);
        }

        header p {
            color: var(--text-muted);
            margin-top: 8px;
        }

        .card {
            background: var(--card-bg);
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border);
        }

        .upload-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }

        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            transition: all 0.2s ease;
            position: relative;
        }

        .drop-zone:hover {
            border-color: var(--primary);
            background-color: #f9fafb;
        }

        .drop-zone label {
            display: block;
            cursor: pointer;
        }

        .drop-zone span {
            display: block;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .drop-zone small {
            color: var(--text-muted);
        }

        input[type="file"] {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        .controls {
            display: flex;
            gap: 12px;
        }

        button {
            flex: 1;
            padding: 14px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            border: none;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-success { background: #059669; color: white; display: none; }
        .btn-success:hover { background: #047857; }

        #summary {
            margin-top: 24px;
            padding: 16px;
            border-radius: 8px;
            display: none;
            font-weight: 500;
        }

        .table-container {
            margin-top: 32px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th {
            background: #f8fafc;
            padding: 14px;
            text-align: left;
            border-bottom: 2px solid var(--border);
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            padding: 14px;
            border-bottom: 1px solid var(--border);
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            background: #f1f5f9;
        }

        .val-mismatch {
            color: var(--error-text);
            background: var(--error-bg);
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
        }

        .val-source {
            color: var(--success-text);
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>HR Data Validator</h1>
        <p>Verifying Contract Management against Active Employee List</p>
    </header>

    <div class="card">
        <div class="upload-section">
            <div class="drop-zone">
                <label>
                    <span>Source of Truth</span>
                    <small>Active Employee List (.xlsx)</small>
                    <input type="file" id="activeFile" accept=".xlsx, .xls">
                </label>
            </div>
            <div class="drop-zone">
                <label>
                    <span>File to Validate</span>
                    <small>Contract Management File (.xlsx)</small>
                    <input type="file" id="contractFile" accept=".xlsx, .xls">
                </label>
            </div>
        </div>

        <div class="controls">
            <button class="btn-primary" onclick="runValidation()">Compare Data</button>
            <button id="downloadBtn" class="btn-success" onclick="exportToExcel()">Download Error Report</button>
        </div>

        <div id="summary"></div>

        <div class="table-container" id="resultsContainer"></div>
    </div>
</div>

<script>
let errorLog = [];

function normalize(val, col) {
    if (val === undefined || val === null || val === "") return "";
    
    // Logic: Round AGE_HIJRI to nearest integer
    if (col === 'AGE_HIJRI') {
        const num = parseFloat(val);
        return isNaN(num) ? "" : Math.round(num).toString();
    }

    // Logic: Standardize Dates (YYYY-MM-DD)
    if (val instanceof Date) {
        return val.toISOString().split('T')[0];
    }
    if (typeof val === 'number' && val > 30000 && val < 60000) {
        const d = XLSX.SSF.parse_date_code(val);
        return `${d.y}-${String(d.m).padStart(2, '0')}-${String(d.d).padStart(2, '0')}`;
    }

    return String(val).trim();
}

async function runValidation() {
    const fileActive = document.getElementById('activeFile').files[0];
    const fileContract = document.getElementById('contractFile').files[0];

    if (!fileActive || !fileContract) {
        alert("Please upload both files to begin.");
        return;
    }

    const activeRows = await readXlsx(fileActive);
    const contractRows = await readXlsx(fileContract);

    const checkCols = [
        'NATIONALITY', 'WORKER_TYPE', 'Age_H', 'AGE_HIJRI', 
        'JOB_NAME', 'CONTRACT_END_DATE', 'PERFORMANCE_EVALUATION_TYPE', 
        '2024_Evaluation', '2025_Evaluation'
    ];

    // Map the Active List (Source of Truth)
    const sourceMap = new Map();
    activeRows.forEach(row => {
        if (row.PERSON_NUMBER) sourceMap.set(String(row.PERSON_NUMBER), row);
    });

    errorLog = [];

    // Loop through Contract File (The one we are checking)
    contractRows.forEach(cRow => {
        const id = String(cRow.PERSON_NUMBER || '');
        const sRow = sourceMap.get(id);

        if (sRow) {
            checkCols.forEach(col => {
                const sourceVal = normalize(sRow[col], col);
                const contractVal = normalize(cRow[col], col);

                if (sourceVal !== contractVal) {
                    errorLog.push({
                        "Person Number": id,
                        "Full Name": sRow.FULL_NAME_G || 'N/A',
                        "Discrepancy Field": col,
                        "Expected (Active List)": sourceVal,
                        "Found (Contract File)": contractVal
                    });
                }
            });
        }
    });

    renderUI();
}

function readXlsx(file) {
    return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = e => {
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, { type: 'array', cellDates: true });
            resolve(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]));
        };
        reader.readAsArrayBuffer(file);
    });
}

function renderUI() {
    const summary = document.getElementById('summary');
    const container = document.getElementById('resultsContainer');
    const dlBtn = document.getElementById('downloadBtn');

    summary.style.display = "block";
    
    if (errorLog.length === 0) {
        summary.style.background = "var(--success-bg)";
        summary.style.color = "var(--success-text)";
        summary.innerHTML = "✅ Perfect Match! The Contract Management file is fully aligned with the Active List.";
        container.innerHTML = "";
        dlBtn.style.display = "none";
    } else {
        summary.style.background = "var(--error-bg)";
        summary.style.color = "var(--error-text)";
        summary.innerHTML = `⚠️ Found ${errorLog.length} errors in the Contract Management file.`;
        dlBtn.style.display = "block";

        let html = `<table><thead><tr>
            <th>Employee</th><th>Field</th><th>Active List (Correct)</th><th>Contract File (Incorrect)</th>
        </tr></thead><tbody>`;

        errorLog.forEach(err => {
            html += `<tr>
                <td><span class="badge">${err["Person Number"]}</span><br><strong>${err["Full Name"]}</strong></td>
                <td><code>${err["Discrepancy Field"]}</code></td>
                <td class="val-source">${err["Expected (Active List)"]}</td>
                <td><span class="val-mismatch">${err["Found (Contract File)"]}</span></td>
            </tr>`;
        });
        html += `</tbody></table>`;
        container.innerHTML = html;
    }
}

function exportToExcel() {
    const ws = XLSX.utils.json_to_sheet(errorLog);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Errors");
    XLSX.writeFile(wb, "Contract_Validation_Errors.xlsx");
}
</script>

</body>
</html>
