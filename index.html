<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Data Validator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; background-color: #f9f9f9; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .file-input-group { border: 2px dashed #cbd5e0; padding: 20px; border-radius: 8px; text-align: center; transition: 0.3s; }
        .file-input-group:hover { border-color: #3182ce; background-color: #f7fafc; }
        input[type="file"] { margin-top: 10px; }
        button { width: 100%; background-color: #2b6cb0; color: white; padding: 12px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2c5282; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; font-size: 14px; }
        th { background-color: #edf2f7; color: #4a5568; text-align: left; padding: 12px; border: 1px solid #e2e8f0; }
        td { padding: 10px; border: 1px solid #e2e8f0; }
        .mismatch-val { color: #e53e3e; font-weight: bold; background: #fff5f5; padding: 2px 4px; border-radius: 4px; }
        .source-name { font-size: 0.85em; color: #718096; display: block; margin-bottom: 2px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Excel Validator: Contract vs. Active List</h2>
    
    <div class="upload-grid">
        <div class="file-input-group">
            <strong>Active Employee List</strong><br>
            <input type="file" id="activeFile" accept=".xlsx, .xls">
        </div>
        <div class="file-input-group">
            <strong>Contract Management File</strong><br>
            <input type="file" id="contractFile" accept=".xlsx, .xls">
        </div>
    </div>

    <button onclick="processFiles()">Compare Files Now</button>

    <div id="output"></div>
</div>

<script>
async function processFiles() {
    const activeFileInput = document.getElementById('activeFile').files[0];
    const contractFileInput = document.getElementById('contractFile').files[0];

    if (!activeFileInput || !contractFileInput) {
        alert("Please upload both Excel files first.");
        return;
    }

    const activeData = await readExcel(activeFileInput);
    const contractData = await readExcel(contractFileInput);

    // Create a Map of the Active List using PERSON_NUMBER as key
    const activeMap = new Map();
    activeData.forEach(row => {
        if (row.PERSON_NUMBER) activeMap.set(String(row.PERSON_NUMBER), row);
    });

    const results = [];

    // Columns to validate (Direct Match)
    const directFields = ['NATIONALITY', 'WORKER_CATEGORY', 'Age_H', 'JOB_NAME', 'CONTRACT_END_DATE'];

    contractData.forEach(cRow => {
        const pId = String(cRow.PERSON_NUMBER);
        const aRow = activeMap.get(pId);

        if (aRow) {
            // 1. Check Direct Matches
            directFields.forEach(field => {
                if (String(cRow[field] || '') !== String(aRow[field] || '')) {
                    addError(results, pId, aRow.FULL_NAME_G, field, aRow[field], cRow[field]);
                }
            });

            // 2. Check Renamed Evaluation Columns
            // Checking 2024 Eval
            if (String(cRow['EVALUATION_RATING__Y_2_'] || '') !== String(aRow['PERFORMANCE_EVALUATION_TYPE'] || '')) {
                addError(results, pId, aRow.FULL_NAME_G, "2024 Eval (PERFORMANCE_EVALUATION_TYPE)", aRow['PERFORMANCE_EVALUATION_TYPE'], cRow['EVALUATION_RATING__Y_2_']);
            }
            // Checking 2025 Eval
            if (String(cRow['EVALUATION_YEAR__Y_1_'] || '') !== String(aRow['PERFORMANCE_EVALUATION_TYPE'] || '')) {
                addError(results, pId, aRow.FULL_NAME_G, "2025 Eval (PERFORMANCE_EVALUATION_TYPE)", aRow['PERFORMANCE_EVALUATION_TYPE'], cRow['EVALUATION_YEAR__Y_1_']);
            }
        }
    });

    displayResults(results);
}

function readExcel(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            resolve(XLSX.utils.sheet_to_json(worksheet));
        };
        reader.readAsArrayBuffer(file);
    });
}

function addError(arr, id, name, field, activeVal, contractVal) {
    arr.push({ id, name, field, activeVal: activeVal || '(Empty)', contractVal: contractVal || '(Empty)' });
}

function displayResults(errors) {
    const output = document.getElementById('output');
    if (errors.length === 0) {
        output.innerHTML = "<p style='color: green; margin-top: 20px;'>✅ Success! All data matches perfectly.</p>";
        return;
    }

    let html = `<table>
        <tr>
            <th>ID / Name</th>
            <th>Field Name</th>
            <th>Value in Active List</th>
            <th>Value in Contract File</th>
        </tr>`;

    errors.forEach(err => {
        html += `<tr>
            <td><strong>${err.id}</strong><br><span class="source-name">${err.name}</span></td>
            <td>${err.field}</td>
            <td>${err.activeVal}</td>
            <td class="mismatch-val">${err.contractVal}</td>
        </tr>`;
    });

    html += `</table>`;
    output.innerHTML = html;
}
</script>

</body>
</html>
