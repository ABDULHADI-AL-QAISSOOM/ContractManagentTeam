<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Excel Data Validator</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; line-height: 1.6; color: #333; }
        .upload-section { display: flex; gap: 20px; margin-bottom: 20px; }
        .file-box { border: 1px solid #ccc; padding: 15px; border-radius: 8px; flex: 1; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f4f4f4; }
        .mismatch { background-color: #ffcccc; font-weight: bold; }
        .match { color: green; }
    </style>
</head>
<body>

    <h2>Data Validation Tool</h2>
    <p>Upload both files to compare columns based on <b>PERSON_NUMBER</b>.</p>

    <div class="upload-section">
        <div class="file-box">
            <strong>1. Active Employee List</strong>
            <input type="file" id="fileActive" accept=".xlsx, .xls">
        </div>
        <div class="file-box">
            <strong>2. Contract Management File</strong>
            <input type="file" id="fileContract" accept=".xlsx, .xls">
        </div>
    </div>

    <button onclick="validateFiles()">Run Validation</button>

    <div id="results"></div>

    <script>
        async function fileToJSON(file) {
            const data = await file.arrayBuffer();
            const workbook = XLSX.read(data);
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            return XLSX.utils.sheet_to_json(sheet);
        }

        async function validateFiles() {
            const activeInput = document.getElementById('fileActive').files[0];
            const contractInput = document.getElementById('fileContract').files[0];

            if (!activeInput || !contractInput) {
                alert("Please upload both files first.");
                return;
            }

            const activeData = await fileToJSON(activeInput);
            const contractData = await fileToJSON(contractInput);

            // Map columns (Contract File Name : Active List Name)
            const colMap = {
                'NATIONALITY': 'NATIONALITY',
                'WORKER_CATEGORY': 'WORKER_CATEGORY',
                'Age_H': 'Age_H',
                'JOB_NAME': 'JOB_NAME',
                'CONTRACT_END_DATE': 'CONTRACT_END_DATE',
                'EVALUATION_RATING__Y_2_': 'PERFORMANCE_EVALUATION_TYPE', // Mapping as requested
                'EVALUATION_YEAR__Y_1_': 'PERFORMANCE_EVALUATION_TYPE'   // Note: Both mapping to same target? 
            };

            // Convert Active List to a Map for fast lookup
            const activeMap = new Map();
            activeData.forEach(row => activeMap.set(String(row.PERSON_NUMBER), row));

            let reportHTML = `<table><tr>
                <th>Person Number</th>
                <th>Full Name</th>
                <th>Field</th>
                <th>Active List Value</th>
                <th>Contract File Value</th>
            </tr>`;

            contractData.forEach(cRow => {
                const pNum = String(cRow.PERSON_NUMBER);
                const aRow = activeMap.get(pNum);

                if (aRow) {
                    // Check the standard columns
                    const fieldsToCheck = ['NATIONALITY', 'WORKER_CATEGORY', 'Age_H', 'JOB_NAME', 'CONTRACT_END_DATE'];
                    
                    fieldsToCheck.forEach(field => {
                        if (String(aRow[field]) !== String(cRow[field])) {
                            reportHTML += `<tr>
                                <td>${pNum}</td>
                                <td>${aRow.FULL_NAME_G || 'N/A'}</td>
                                <td>${field}</td>
                                <td>${aRow[field]}</td>
                                <td class="mismatch">${cRow[field]}</td>
                            </tr>`;
                        }
                    });

                    // Check the special Evaluation Mappings
                    // Logic: Comparing Active List 'PERFORMANCE_EVALUATION_TYPE' against the renamed contract columns
                    const eval24 = cRow['EVALUATION_RATING__Y_2_'];
                    if (String(aRow['PERFORMANCE_EVALUATION_TYPE']) !== String(eval24)) {
                         reportHTML += `<tr><td>${pNum}</td><td>${aRow.FULL_NAME_G}</td><td>Eval 2024</td><td>${aRow['PERFORMANCE_EVALUATION_TYPE']}</td><td class="mismatch">${eval24}</td></tr>`;
                    }
                }
            });

            reportHTML += "</table>";
            document.getElementById('results').innerHTML = reportHTML || "<h3>No mismatches found!</h3>";
        }
    </script>
</body>
</html>
